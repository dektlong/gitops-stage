apiVersion: servicebinding.io/v1alpha3
kind: ServiceBinding
metadata:
  name: mood-sensors-web-postgres-claim
  annotations:
    autoscaling.knative.dev/minScale: "1"
  labels:
    apis.apps.tanzu.vmware.com/register-api: "true"
    app.kubernetes.io/part-of: mood-sensors-web
    apps.tanzu.vmware.com/has-tests: "true"
    apps.tanzu.vmware.com/workload-type: web
    app.kubernetes.io/component: run
    carto.run/workload-name: mood-sensors-web
spec:
  name: postgres-claim
  service:
    apiVersion: services.apps.tanzu.vmware.com/v1alpha1
    kind: ResourceClaim
    name: inventory-db
  workload:
    apiVersion: serving.knative.dev/v1
    kind: Service
    name: mood-sensors-web
---
apiVersion: servicebinding.io/v1alpha3
kind: ServiceBinding
metadata:
  name: mood-sensors-web-rabbitmq-claim
  annotations:
    autoscaling.knative.dev/minScale: "1"
  labels:
    apis.apps.tanzu.vmware.com/register-api: "true"
    app.kubernetes.io/part-of: mood-sensors-web
    apps.tanzu.vmware.com/has-tests: "true"
    apps.tanzu.vmware.com/workload-type: web
    app.kubernetes.io/component: run
    carto.run/workload-name: mood-sensors-web
spec:
  name: rabbitmq-claim
  service:
    apiVersion: rabbitmq.com/v1beta1
    kind: RabbitmqCluster
    name: reading-queue
  workload:
    apiVersion: serving.knative.dev/v1
    kind: Service
    name: mood-sensors-web

